name: Maven Test

on:
  push:
    branches: [main, canon-main]
  pull_request:
    branches: [main, canon-main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: newer/new/registrar

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests (exclude ModulithTests)
        run: mvn -B test -Dtest=!ModulithTests
        continue-on-error: false

      - name: ModulithTests (non-blocking)
        run: mvn -B test -Dtest=ModulithTests
        continue-on-error: true
