<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tabler Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <!-- Custom Theme (EAC) -->
    <link rel="stylesheet" th:href="@{/css/theme-eac.css}">
</head>
<body>

<!-- TOPBAR FRAGMENT -->
<div th:fragment="topbar" class="topbar">
    <div class="topbar-left">
        <div class="logo-mark">
            <!-- EAC Shield Icon (Generic/Placeholder matching spec) -->
            <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EAC shield logo">
                <path d="M9 2L3 5.5V9C3 12.31 5.54 15.41 9 16C12.46 15.41 15 12.31 15 9V5.5L9 2Z" fill="#B91C1C"/>
                <path d="M7 9L8.5 10.5L11.5 7.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div>
            <div class="school-name">Emilio Aguinaldo College</div>
            <div class="school-sub">Registrar Portal</div>
        </div>
    </div>
    <div class="topbar-right">
        <button class="top-icon-btn" title="Search" aria-label="Global search">
            <i class="ti ti-search" aria-hidden="true"></i>
        </button>
        <button class="top-icon-btn" title="Notifications" aria-label="Notifications">
            <i class="ti ti-bell" aria-hidden="true"></i>
            <span class="notif-dot"></span>
        </button>
        <button class="top-icon-btn" title="Help" aria-label="Help">
            <i class="ti ti-help" aria-hidden="true"></i>
        </button>
        <!-- The initials could be dynamic based on the logged-in user in a real scenario -->
        <div class="avatar" title="Registrar" role="button" tabindex="0" aria-label="Account menu">RG</div>
    </div>
</div>

<!-- SIDEBAR FRAGMENT -->
<nav th:fragment="sidebar(activeLink)" class="sidebar" role="navigation" aria-label="Main navigation">
    <div class="nav-section-label">Overview</div>
    <a th:href="@{/}" class="nav-item" th:classappend="${activeLink == 'dashboard' ? 'active' : ''}">
        <i class="ti ti-layout-dashboard" aria-hidden="true"></i> <span>Dashboard</span>
    </a>

    <div class="nav-section-label">Admissions</div>
    <a th:href="@{/admin/admission-acceptance}" class="nav-item" th:classappend="${activeLink == 'admissions' ? 'active' : ''}">
        <i class="ti ti-user-check" aria-hidden="true"></i> <span>Admissions</span>
    </a>
    <a th:href="@{/admin/student-manager}" class="nav-item" th:classappend="${activeLink == 'students' ? 'active' : ''}">
        <i class="ti ti-users" aria-hidden="true"></i> <span>Student Directory</span>
    </a>

    <div class="nav-section-label">Academics</div>
    <a th:href="@{/admin/curriculum}" class="nav-item" th:classappend="${activeLink == 'curriculum' ? 'active' : ''}">
        <i class="ti ti-book" aria-hidden="true"></i> <span>Curriculum</span>
    </a>
    <a th:href="@{/admin/classes}" class="nav-item" th:classappend="${activeLink == 'classes' ? 'active' : ''}">
        <i class="ti ti-school" aria-hidden="true"></i> <span>Subjects</span>
    </a>
    <a th:href="@{/admin/class-scheduling}" class="nav-item" th:classappend="${activeLink == 'scheduling' ? 'active' : ''}">
        <i class="ti ti-calendar-time" aria-hidden="true"></i> <span>Class Scheduling</span>
    </a>
    <a th:href="@{/admin/faculty-load}" class="nav-item" th:classappend="${activeLink == 'faculty' ? 'active' : ''}">
        <i class="ti ti-chalkboard" aria-hidden="true"></i> <span>Faculty Load</span>
    </a>
    <a th:href="@{/admin/approvals}" class="nav-item" th:classappend="${activeLink == 'grades' ? 'active' : ''}">
        <i class="ti ti-table" aria-hidden="true"></i> <span>Grade Records</span>
    </a>

    <div class="nav-section-label">Admin & Finance</div>
    <a th:href="@{/admin/term-fees}" class="nav-item" th:classappend="${activeLink == 'term-fees' ? 'active' : ''}">
        <i class="ti ti-coin" aria-hidden="true"></i> <span>Term Fees</span>
    </a>
    <a th:href="@{/admin/scholarships}" class="nav-item" th:classappend="${activeLink == 'scholarships' ? 'active' : ''}">
        <i class="ti ti-award" aria-hidden="true"></i> <span>Scholarships</span>
    </a>
    <a th:href="@{/admin/users}" class="nav-item" th:classappend="${activeLink == 'users' ? 'active' : ''}">
        <i class="ti ti-users-group" aria-hidden="true"></i> <span>Users &amp; Access</span>
    </a>
    <a th:href="@{/admin/settings}" class="nav-item" th:classappend="${activeLink == 'settings' ? 'active' : ''}">
        <i class="ti ti-settings" aria-hidden="true"></i> <span>Settings</span>
    </a>
</nav>

</body>
</html>
