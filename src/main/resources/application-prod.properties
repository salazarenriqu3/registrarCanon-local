# Production profile — activate with: SPRING_PROFILES_ACTIVE=prod
# Required env vars: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/eacdb?zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Manila}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:registrar_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.show-sql=false

# Never reset demo passwords in production
registrar.demo.reset-passwords-on-boot=false

# MCP server is for development automation only
spring.ai.mcp.server.webmvc.enabled=false

# Tighter session cookie defaults (HTTPS assumed at reverse proxy)
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
