spring.application.name=RegistrarSubsystem
server.port=8083
server.servlet.context-path=/registrar

# FORCE connection to the V2 database
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/eacdb?createDatabaseIfNotExist=true&zeroDateTimeBehavior=convertToNull&serverTimezone=Asia/Manila
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Disable Hibernate auto-updates so it doesn't mess up your tables
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Daily INC expiration (1:30 AM server time). Override or disable with "-".
registrar.inc-expiration.cron=0 30 1 * * *
# Demo-only convenience. Keep false outside controlled UAT/demo bootstraps.
registrar.demo.reset-passwords-on-boot=false
# Add this to the bottom of your existing application.properties
server.servlet.session.tracking-modes=cookie
# Allow uploading larger receipt images
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Tomcat Threading Optimization
server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
server.tomcat.accept-count=200
server.tomcat.connection-timeout=20000

# HikariCP Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
 
# Spring AI MCP Server Configuration
spring.ai.mcp.server.webmvc.enabled=true
