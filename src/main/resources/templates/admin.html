<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/csrf :: support}"></th:block>
<script th:inline="javascript">
    /* This creates a global JS variable with the correct folder path */
    const contextPath = /*[[@{/}]]*/ '';
</script>
</head>
<body class="container mt-4">
    <h2>Registrar Admin Panel</h2>
    <a th:href="@{/}" class="btn btn-secondary mb-3">Back to Dashboard</a>

    <div class="card mb-4">
        <div class="card-header bg-success text-white">Create New User</div>
        <div class="card-body">
            <form th:action="@{/create-user}" method="post">
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label>Username</label><input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label>Real Name</label><input type="text" name="realName" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label>Role</label>
                        <select name="role" class="form-select">
                            <option value="Student">Student</option>
                            <option value="Faculty">Faculty</option>
                            <option value="Registrar">Registrar</option>
                        </select>
                    </div>
                </div>
                
                <label class="fw-bold">Grant Permissions:</label>
                <div class="row mb-3">
                    <div class="col-md-3">
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="permissions" value="VIEW_GRADES" checked><label>View Grades</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="permissions" value="ADD_DROP"><label>Withdrawal / Enrollment Changes</label></div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="permissions" value="INPUT_GRADES"><label>Input Grades</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="permissions" value="SUBMIT_GRADES"><label>Submit Grades</label></div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="permissions" value="RECTIFY_GRADES"><label>Rectify Grades</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="permissions" value="FACULTY_LOAD"><label>Faculty Load</label></div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="permissions" value="MANAGE_USERS"><label>Manage Users</label></div>
                    </div>
                </div>
                <button class="btn btn-success w-100">Create User</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white">Class Management</div>
        <div class="card-body">
            <table class="table">
                <thead><tr><th>Course</th><th>Section</th><th>Faculty</th><th>Action</th><th>Report</th></tr></thead>
                <tbody>
                    <tr th:each="c : ${classes}">
                        <td th:text="${c.course_code}"></td>
                        <td th:text="${c.section}"></td>
                        <td>
                            <form th:action="@{/assign-faculty}" method="post" class="d-flex">
                                <input type="hidden" name="scheduleId" th:value="${c.schedule_id}">
                                <select name="facultyId" class="form-select form-select-sm me-2">
                                    <option value="0">-- Unassigned --</option>
                                    <option th:each="f : ${facultyList}" th:value="${f.user_id}" th:text="${f.real_name}" th:selected="${f.user_id == c.faculty_id}"></option>
                                </select>
                                <button class="btn btn-sm btn-primary">Save</button>
                            </form>
                        </td>
                        <td><a th:href="@{'/class-list/' + ${c.schedule_id}}" class="btn btn-sm btn-info">Class List</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
