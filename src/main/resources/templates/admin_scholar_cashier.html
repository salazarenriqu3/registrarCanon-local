<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cashier / Enlistment | EAC Registrar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <th:block th:replace="~{fragments/csrf :: support}"></th:block>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f5f7; display: flex; min-height: 100vh; }
        :root { --maroon: #800000; --gold: #d4af37; }
        .sidebar { width: 240px; background: var(--maroon); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.15); color: var(--gold); }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 13px 20px; color: rgba(255,255,255,0.78); text-decoration: none; font-size: 0.9rem; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left: 3px solid var(--gold); }
        .main-content { flex: 1; overflow-y: auto; }
        .content-header { background: white; padding: 20px 30px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; color: var(--maroon); }
        .body-wrap { padding: 25px 30px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 20px; overflow: hidden; }
        .card-header { background: var(--maroon); color: white; padding: 12px 20px; border-bottom: 2px solid var(--gold); display: flex; align-items: center; gap: 10px; }
        .card-body { padding: 20px; }
        .alert { padding: 14px 18px; border-radius: 6px; margin-bottom: 18px; }
        .alert-success { background: #d4edda; color: #155724; border-left: 5px solid #28a745; }
        .form-control { width: 100%; padding: 10px; border: 1.5px solid #ccc; border-radius: 6px; margin-bottom: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; background: var(--maroon); color: white; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        .data-table th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        .data-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .amount-big { font-size: 2rem; font-weight: 900; color: #c0392b; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-header"><h3>EAC REGISTRAR</h3></div>
    <nav class="nav-menu">
        <a th:href="@{/admin}" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
        <a th:href="@{/admin/scholar-cashier}" class="nav-item active"><i class="fas fa-user-graduate"></i> Scholarship Cashier</a>
        <form th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="nav-item" style="width: 100%; text-align: left; background: none; border: 0;">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>
    </nav>
</aside>
<div class="main-content">
    <header class="content-header"><h1>Scholarship Cashier</h1></header>
    <div class="body-wrap">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/scholar-cashier}" method="GET" style="display:flex; gap:10px;">
                    <input type="text" name="keyword" class="form-control" style="margin:0;" placeholder="Search Student ID or Name..." th:value="${keyword}">
                    <button type="submit" class="btn">LOAD</button>
                </form>
            </div>
        </div>
        <div th:if="${student != null}">
            <div class="card" style="border-left: 8px solid var(--maroon);">
                <div class="card-body" style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h2 th:text="${student.real_name}"></h2>
                        <p th:text="${student.username + ' | ' + student.program_code + ' | Year ' + student.year_level}"></p>
                    </div>
                    <div style="text-align:right;">
                        <label style="font-size:0.7rem; font-weight:bold;">BALANCE</label>
                        <div class="amount-big" th:text="${'₱ ' + balance_fmt}"></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><i class="fas fa-plus"></i><h3>Add Subjects</h3></div>
                <div class="card-body">
                    <form th:action="@{/admin/enlist-subject}" method="POST" style="display:flex; gap:10px;">
                        <input type="hidden" name="sid" th:value="${student.username}">
                        <input type="hidden" name="keyword" th:value="${keyword}">
                        <select name="sectionId" class="form-control" style="margin:0;">
                            <optgroup label="DESIGNATED COURSES">
                                <option th:each="c : ${designatedCourses}" th:value="${c.section_id}" th:text="${c.course_code + ' - ' + c.course_title + ' [' + c.schedule + ']'}"></option>
                            </optgroup>
                            <optgroup label="OTHER COURSES">
                                <option th:each="c : ${otherCourses}" th:value="${c.section_id}" th:text="${c.course_code + ' - ' + c.course_title}"></option>
                            </optgroup>
                        </select>
                        <button type="submit" class="btn" style="background:#27ae60;">ADD</button>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><i class="fas fa-book"></i><h3>Enlisted Load</h3></div>
                <div class="card-body" style="padding:0;">
                    <table class="data-table">
                        <thead><tr><th>Code</th><th>Title</th><th>Units</th><th>Schedule</th><th>Withdrawal</th></tr></thead>
                        <tbody>
                            <tr th:each="s : ${enlistedSubjects}">
                                <td th:text="${s.course_code}"></td>
                                <td th:text="${s.description}"></td>
                                <td th:text="${s.units}"></td>
                                <td th:text="${s.schedule}"></td>
                                <td>
                                    <a th:href="@{/admin/student-manager(username=${keyword})}" class="btn" style="background:#c0392b; padding:5px 10px; font-size:0.7rem;">REQUEST IN PROFILE</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
