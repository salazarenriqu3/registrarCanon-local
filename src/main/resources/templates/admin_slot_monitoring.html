<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Slot Monitoring - EAC Registrar</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
    <style>
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1rem; margin-bottom:1.5rem; }
        .stat-card { background:white; border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:1rem; }
        .stat-value { font-size:1.6rem; font-weight:800; }
        .stat-label { color:var(--text-muted); font-size:.75rem; font-weight:700; text-transform:uppercase; }
        .filter-row { display:flex; gap:.8rem; flex-wrap:wrap; align-items:flex-end; margin-bottom:1rem; }
        .row-actions { display:flex; gap:.3rem; flex-wrap:wrap; justify-content:flex-end; }
        .cap-input { width:70px; padding:.25rem .4rem; }
    </style>
</head>
<body>
<div class="app">
    <th:block th:replace="~{fragments/layout :: topbar}"></th:block>
    <div class="body-wrapper">
        <th:block th:replace="~{fragments/layout :: sidebar('slot-monitoring')}"></th:block>
        <main class="main">
            <div th:if="${msg}" class="alert alert-success" style="margin-bottom:1rem;"><span th:text="${msg}"></span></div>
            <h1 class="page-title">Slot Monitoring</h1>
            <p class="page-subtitle">Enrolled vs pre-registered counts, capacity controls, close and dissolve actions.</p>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" th:text="${summary.total}">0</div><div class="stat-label">Sections</div></div>
                <div class="stat-card"><div class="stat-value" th:text="${summary.open}">0</div><div class="stat-label">Open</div></div>
                <div class="stat-card"><div class="stat-value" th:text="${summary.closed}">0</div><div class="stat-label">Closed / Dissolved</div></div>
                <div class="stat-card"><div class="stat-value" th:text="${summary.full}">0</div><div class="stat-label">At Capacity</div></div>
            </div>

            <form th:action="@{/admin/slot-monitoring}" method="get" class="filter-row">
                <div><label class="form-label">Term</label>
                    <select name="termId" class="form-control" onchange="this.form.submit()">
                        <option th:each="t : ${terms}" th:value="${t.term_id}" th:text="${t.term_name}" th:selected="${t.term_id == termId}"></option>
                    </select>
                </div>
                <div><label class="form-label">Search</label><input name="search" class="form-control" th:value="${search}" placeholder="Course or section"></div>
                <button type="submit" class="btn btn-primary">Apply</button>
                <a th:href="@{/admin/class-scheduling(termId=${termId})}" class="btn btn-outline">Class Scheduling</a>
            </form>

            <form th:action="@{/admin/slot-monitoring/bulk-close}" method="post">
                <input type="hidden" name="termId" th:value="${termId}">
                <input type="hidden" name="search" th:value="${search}">
                <div class="card" style="padding:0; overflow:hidden;">
                    <div style="padding:.75rem 1rem; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center;">
                        <label style="margin:0;"><input type="checkbox" id="selectAll" onclick="document.querySelectorAll('.sec-check').forEach(c=>c.checked=this.checked)"> Select all</label>
                        <button type="submit" class="btn btn-outline" onclick="return confirm('Close selected sections?')">Close Selected</button>
                    </div>
                    <table class="table-eac" style="margin:0;">
                        <thead><tr>
                            <th></th><th>Course</th><th>Section</th><th>Enrolled</th><th>Pre-Reg</th><th>Max</th><th>Left</th><th>Status</th><th>Actions</th>
                        </tr></thead>
                        <tbody>
                        <tr th:each="s : ${sections}">
                            <td><input class="sec-check" type="checkbox" name="sectionIds" th:value="${s.section_id}" th:disabled="${s.is_closed}"></td>
                            <td><strong th:text="${s.course_code}"></strong><br><small th:text="${s.course_title}"></small></td>
                            <td th:text="${s.section_code}"></td>
                            <td th:text="${s.enrolled_count}"></td>
                            <td th:text="${s.prereg_count}"></td>
                            <td>
                                <form th:action="@{/admin/slot-monitoring/update-capacity}" method="post" style="display:flex; gap:.25rem; margin:0;">
                                    <input type="hidden" name="sectionId" th:value="${s.section_id}">
                                    <input type="hidden" name="termId" th:value="${termId}">
                                    <input type="hidden" name="search" th:value="${search}">
                                    <input class="form-control cap-input" type="number" name="maxCapacity" th:value="${s.max_capacity}" min="1" max="500">
                                    <button type="submit" class="btn btn-outline" style="padding:.2rem .45rem;" title="Save capacity"><i class="ti ti-device-floppy"></i></button>
                                </form>
                            </td>
                            <td th:text="${s.slots_left}"></td>
                            <td><span class="status-badge" th:classappend="${s.is_closed} ? 'inactive' : (${s.is_full} ? 'waitlist' : 'enrolled')" th:text="${s.section_status}"></span></td>
                            <td>
                                <div class="row-actions">
                                    <form th:if="${!s.is_closed}" th:action="@{/admin/slot-monitoring/close}" method="post" style="margin:0;">
                                        <input type="hidden" name="sectionId" th:value="${s.section_id}">
                                        <input type="hidden" name="termId" th:value="${termId}">
                                        <input type="hidden" name="search" th:value="${search}">
                                        <button type="submit" class="btn btn-outline" style="padding:.25rem .5rem;" title="Close">Close</button>
                                    </form>
                                    <form th:action="@{/admin/slot-monitoring/dissolve}" method="post" style="margin:0;">
                                        <input type="hidden" name="sectionId" th:value="${s.section_id}">
                                        <input type="hidden" name="termId" th:value="${termId}">
                                        <input type="hidden" name="search" th:value="${search}">
                                        <button type="submit" class="btn btn-outline" style="padding:.25rem .5rem;" onclick="return confirm('Dissolve this section?')" title="Dissolve">Dissolve</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(sections)}"><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-muted);">No sections for this term.</td></tr>
                        </tbody>
                    </table>
                </div>
            </form>
        </main>
    </div>
</div>
</body>
</html>
