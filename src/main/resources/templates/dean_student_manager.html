<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dean Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <th:block th:replace="~{fragments/csrf :: support}"></th:block>
<script th:inline="javascript">
    /* This creates a global JS variable with the correct folder path */
    const contextPath = /*[[@{/}]]*/ '';
</script>
</head>
<body>
    <div class="container mt-5">
        <div class="card card-modern p-4 mb-4 border-start border-5 border-primary">
            <div class="d-flex justify-content-between">
                <h3>Dean's Student Manager</h3>
                <a th:href="@{/}" class="btn btn-secondary">Back</a>
            </div>
            <form th:action="@{/faculty/manage-student}" method="get" class="mt-3 d-flex gap-2">
                <input type="text" name="username" class="form-control" placeholder="Enter Student ID (e.g. juan)" required>
                <button class="btn btn-primary">Search</button>
            </form>
        </div>

        <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

        <div th:if="${student != null}">
            <h5 class="mb-3 text-primary" th:text="'Managing: ' + ${student.real_name}"></h5>
            <div class="row">
                <div class="col-md-6">
                    <div class="card card-modern p-3">
                        <h6>Available Classes</h6>
                        <table class="table table-sm table-hover align-middle">
                            <tr th:each="c : ${allClasses}">
                                <td>
                                    <strong th:text="${c.course_code}"></strong> <small th:text="${c.section}"></small><br>
                                    <span class="text-muted" style="font-size:0.8em" th:text="${c.pretty_schedule}"></span>
                                </td>
                                <td class="text-end">
                                    <form th:action="@{/faculty/request-add}" method="post">
                                        <input type="hidden" name="studentId" th:value="${student.username}">
                                        <input type="hidden" name="scheduleId" th:value="${c.schedule_id}">
                                        <button class="btn btn-sm btn-success rounded-circle"><i class="fas fa-plus"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card card-modern p-3 bg-light">
                        <h6>Current Load</h6>
                        <table class="table table-sm align-middle">
                            <tr th:each="load : ${studentLoad}">
                                <td th:text="${load.course_code}"></td>
                                <td><span class="badge" th:classappend="${load.enrollment_status == 'APPROVED' ? 'bg-success' : 'bg-warning text-dark'}" th:text="${load.enrollment_status}"></span></td>
                                <td class="text-end">
                                    <form th:action="@{/faculty/request-drop}" method="post">
                                        <input type="hidden" name="studentId" th:value="${student.username}">
                                        <input type="hidden" name="scheduleId" th:value="${load.schedule_id}">
                                        <button class="btn btn-sm btn-danger rounded-circle"><i class="fas fa-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
