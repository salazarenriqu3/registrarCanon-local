<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Login</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/modern-style.css}">
<th:block th:replace="~{fragments/csrf :: support}"></th:block>
<style>body{background:linear-gradient(135deg,var(--eac-red) 0%,#2c0000 100%);height:100vh;display:flex;align-items:center;justify-content:center;} .login-box{background:white;border-radius:20px;width:400px;padding:40px;box-shadow:0 10px 30px rgba(0,0,0,0.3);text-align:center;} .btn-login{background:var(--eac-red);color:white;width:100%;border-radius:25px;padding:10px;}</style>
<script th:inline="javascript">
    /* This creates a global JS variable with the correct folder path */
    const contextPath = /*[[@{/}]]*/ '';
</script>
</head>
<body>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/en/8/87/Emilio_Aguinaldo_College_seal.svg" width="100" class="mb-3">
        <h4 class="mb-4 text-secondary">Sign In</h4>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${param.error}" class="alert alert-danger">Invalid Credentials</div>
        <div th:if="${param.logout}" class="alert alert-success">You have been signed out.</div>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" style="border-radius:20px;" required>
            <input type="password" name="password" class="form-control mb-4" placeholder="Password" style="border-radius:20px;" required>
            <button class="btn btn-login">Login</button>
        </form>
    </div>
</body></html>
