<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Certificate of Grades - [[${student.username}]]</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; font-size: 13px; background: #fff; color: #000; }
        .cog-container { width: 100%; max-width: 900px; margin: 0 auto; padding: 20px; }
        .header-title { font-weight: bold; font-size: 22px; text-transform: uppercase; text-align: center; }
        .sub-title { font-size: 16px; text-align: center; margin-bottom: 30px; font-weight: bold; }
        
        .info-table { width: 100%; margin-bottom: 30px; }
        .info-table td { padding: 5px; }
        
        .grade-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .grade-table th, .grade-table td { border: 1px solid #000; padding: 8px; text-align: center; }
        .grade-table th { background-color: #f0f0f0; font-weight: bold; }
        .grade-table .text-start { text-align: left; }
        
        .signature-line { border-top: 1px solid #000; width: 250px; margin-top: 60px; text-align: center; font-weight: bold; padding-top: 5px; }
        
        @media print {
            @page { margin: 15mm; size: A4 portrait; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
    </style>

<script th:inline="javascript">
    /* This creates a global JS variable with the correct folder path */
    const contextPath = /*[[@{/}]]*/ '';
</script>
</head>
<body>

    <div class="text-center my-3 no-print">
        <button class="btn btn-primary" onclick="window.print()"><i class="fas fa-print"></i> Print Document</button>
        <button class="btn btn-secondary" onclick="window.close()">Close Tab</button>
    </div>

    <div class="cog-container">
        <div class="header-title">Emilio Aguinaldo College</div>
        <div class="sub-title">CERTIFICATE OF GRADES</div>

        <table class="info-table">
            <tr>
                <td style="width: 15%;"><strong>Name:</strong></td>
                <td style="width: 50%; border-bottom: 1px solid #000;" th:text="${student.real_name}"></td>
                <td style="width: 15%; text-align: right; padding-right: 10px;"><strong>Student No:</strong></td>
                <td style="width: 20%; border-bottom: 1px solid #000;" th:text="${student.username}"></td>
            </tr>
            <tr>
                <td><strong>Course:</strong></td>
                <td style="border-bottom: 1px solid #000;" th:text="${student.program_code}"></td>
                <td style="text-align: right; padding-right: 10px;"><strong>Date:</strong></td>
                <td style="border-bottom: 1px solid #000;" th:text="${#dates.format(#dates.createNow(), 'MMM dd, yyyy')}"></td>
            </tr>
        </table>

        <div th:if="${#maps.isEmpty(academicHistory)}" class="text-center py-5">
            <i>No finalized academic records found for this student.</i>
        </div>

        <div th:each="year : ${academicHistory}">
            <h6 class="fw-bold bg-light p-2 border border-bottom-0 mb-0">Academic Year: <span th:text="${year.key}"></span></h6>
            <table class="grade-table">
                <thead>
                    <tr>
                        <th style="width: 15%;">Subject Code</th>
                        <th class="text-start" style="width: 55%;">Descriptive Title</th>
                        <th style="width: 15%;">Final Grade</th>
                        <th style="width: 15%;">Remarks</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="sub : ${year.value}">
                        <td class="fw-bold" th:text="${sub.course_code}"></td>
                        <td class="text-start" th:text="${sub.description}"></td>
                        <td class="fw-bold" th:text="${sub.semestral_grade}"></td>
                        <td th:text="${sub.remarks}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-end">
            <div class="signature-line">
                College Registrar
            </div>
        </div>

        <div class="text-center mt-5 small text-muted">
            <p><em>Not valid without the official College Seal.</em></p>
        </div>
    </div>

    <script>window.onload = function() { setTimeout(function() { window.print(); }, 500); };</script>
</body>
</html>
