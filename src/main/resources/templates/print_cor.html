<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${formTitle != null ? formTitle : 'Registration Form'}">Registration Form</title>
    <style>
        body { background: #f8f9fa; margin: 0; padding: 1rem 0; }
        .no-print {
            text-align: center;
            margin-bottom: 1rem;
        }
        .no-print button, .no-print a {
            font-size: 0.9rem;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            margin: 0 0.25rem;
            text-decoration: none;
            cursor: pointer;
        }
        .no-print button {
            background: #dc3545;
            color: #fff;
            border: none;
            font-weight: 700;
        }
        .no-print a {
            background: #fff;
            color: #333;
            border: 1px solid #ccc;
        }
        .document-shell {
            max-width: 8.5in;
            margin: 0 auto;
            background: #fff;
            padding: 0.5in;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        @media print {
            body { background: #fff; padding: 0; }
            .no-print { display: none !important; }
            .document-shell { box-shadow: none; padding: 0; max-width: none; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <button type="button" onclick="window.print()">Print Registration Form</button>
        <a th:href="@{/admin/student-manager(username=${student.username})}">Back</a>
    </div>
    <div class="document-shell">
        <div th:replace="~{fragments/eac_registration_document :: document}"></div>
    </div>
</body>
</html>
