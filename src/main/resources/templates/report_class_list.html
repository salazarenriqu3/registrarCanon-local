<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Official Class List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{padding:40px;background:#fff}.header-box{border-bottom:2px solid #000;margin-bottom:20px;padding-bottom:10px}</style>

<script th:inline="javascript">
    /* This creates a global JS variable with the correct folder path */
    const contextPath = /*[[@{/}]]*/ '';
</script>
</head>
<body>
    <div class="container">
        <div class="header-box">
            <div class="row">
                <div class="col-6">
                    <h3>EAC Registrar</h3>
                    <small>Official Class Roster</small>
                </div>
                <div class="col-6 text-end" th:if="${classInfo != null}">
                    <h4 th:text="${classInfo.course_code}"></h4>
                    <h5 th:text="'Section: ' + ${classInfo.section}"></h5>
                    <small th:text="'Faculty: ' + ${classInfo.faculty_name}"></small>
                </div>
            </div>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark"><tr><th>Student ID</th><th>Name</th><th>Date Enrolled</th></tr></thead>
            <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.username}"></td>
                    <td th:text="${s.real_name}"></td>
                    <td th:text="${s.enrollment_date}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}"><td colspan="3" class="text-center">No students enrolled.</td></tr>
            </tbody>
        </table>
        <div class="mt-4 d-print-none">
            <button onclick="window.print()" class="btn btn-secondary">Print Report</button>
        </div>
    </div>
</body>
</html>
