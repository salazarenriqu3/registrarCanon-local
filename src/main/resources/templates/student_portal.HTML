<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <th:block th:replace="~{fragments/csrf :: support}"></th:block>

<script th:inline="javascript">
    /* This creates a global JS variable with the correct folder path */
    const contextPath = /*[[@{/}]]*/ '';
</script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-danger shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="fas fa-user-graduate me-2"></i> STUDENT PORTAL</span>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small" th:text="${student.real_name}"></span>
                <form th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
                    <button type="submit" class="btn btn-sm btn-outline-light">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header bg-white fw-bold border-bottom-0">
                        <i class="fas fa-book-open text-primary me-2"></i> Current Enrolled Subjects
                    </div>
                    <div class="card-body p-0">
                        <table class="table mb-0">
                            <tr th:each="s : ${load}">
                                <td class="ps-3 border-0">
                                    <strong th:text="${s.course_code}"></strong><br>
                                    <small class="text-muted" th:text="${s.pretty_schedule}"></small>
                                </td>
                                <td class="text-center border-0 align-middle">
                                    <span class="badge bg-primary">Enrolled</span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(load)}">
                                <td class="p-4 text-center text-muted border-0">
                                    You are not enrolled in any subjects yet.
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white fw-bold border-bottom-0">
                        <i class="fas fa-history text-success me-2"></i> Academic History
                    </div>
                    <div class="card-body p-0" style="max-height: 500px; overflow-y: auto;">
                        <div th:each="year : ${history}" class="border-bottom">
                            <div class="bg-light p-2 small fw-bold text-muted ps-3" 
                                 th:text="'Academic Year: ' + ${year.key}"></div>
                            <table class="table table-sm mb-0">
                                <tr th:each="sub : ${year.value}">
                                    <td class="ps-3 border-0" th:text="${sub.course_code}"></td>
                                    <td class="text-end pe-3 border-0 fw-bold" 
                                        th:classappend="${sub.remarks == 'Failed' ? 'text-danger' : 'text-success'}"
                                        th:text="${sub.semestral_grade}"></td>
                                </tr>
                            </table>
                        </div>
                        <div th:if="${#maps.isEmpty(history)}" class="p-4 text-center text-muted">
                            No grades available yet.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
